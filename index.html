<h2>6E · Signatur-Renderer</h2>
<canvas id="sigCanvas" width="500" height="300"></canvas>
</section>

<script>
// --- 6E SIGNATUR-RENDERER (High-Class) ---
const c = document.getElementById("sigCanvas");
const x = c.getContext("2d");

let t = 0;

function renderSignature() {
    x.clearRect(0,0,c.width,c.height);

    // 6e Energieachsen (Rotation)
    const colors = ["#0f0","#6cf","#0ff","#9f0","#f90","#f00"];
    for(let i=0;i<6;i++){
        x.strokeStyle = colors[i];
        x.lineWidth = 2;
        x.beginPath();
        x.arc(250,150,40 + i*10 + Math.sin(t+i)*5,0,Math.PI*2);
        x.stroke();
    }

    // 6d Gesetzachsen (Scan)
    x.fillStyle = "#6cf";
    x.fillRect(20,260,460*(0.5+Math.sin(t)/2),10);

    // 12e Spiegel (Puls)
    x.strokeStyle = "#0f0";
    x.lineWidth = 3;
    x.beginPath();
    x.arc(250,150,120 + Math.sin(t*2)*10,0,Math.PI*2);
    x.stroke();

    // Octa³ Blink
    if(Math.sin(t*3) > 0.8){
        x.fillStyle = "#f00";
        x.fillRect(10,10,20,20);
    }

    t += 0.05;
    requestAnimationFrame(renderSignature);
}
renderSignature();
</script>
